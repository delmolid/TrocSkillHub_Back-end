<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="950" viewBox="0 0 1400 950">
  <defs>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 600 18px Arial, sans-serif; fill: #374151; }
      .label { font: 500 16px Arial, sans-serif; fill: #374151; }
      .small { font: 14px Arial, sans-serif; fill: #4b5563; }
      .tiny { font: 12px Arial, sans-serif; fill: #6b7280; }
      .blue-title { font: 700 22px Arial, sans-serif; fill: #1d4ed8; }
      .green-title { font: 700 22px Arial, sans-serif; fill: #15803d; }
      .purple-title { font: 700 22px Arial, sans-serif; fill: #7e22ce; }
      .orange-title { font: 700 18px Arial, sans-serif; fill: #c2410c; }
      .box { fill: #ffffff; stroke-width: 3; rx: 16; }
      .blue-box { stroke: #2563eb; }
      .green-box { stroke: #16a34a; }
      .purple-box { stroke: #9333ea; }
      .orange-box { stroke: #f97316; }
      .gray-box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; rx: 14; }
      .dash-box { fill: #ffffff; stroke: #64748b; stroke-width: 2; stroke-dasharray: 8 8; rx: 14; }
      .arrow { stroke: #111827; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .arrow-blue { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrowhead-blue); }
      .arrow-green { stroke: #16a34a; stroke-width: 3; fill: none; marker-end: url(#arrowhead-green); }
      .https { font: 700 16px Arial, sans-serif; fill: #15803d; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#111827" />
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb" />
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a" />
    </marker>
  </defs>

  <rect width="1400" height="950" fill="#ffffff"/>

  <text x="700" y="45" text-anchor="middle" class="title">Architecture TrocSkillHub apres migration vers VPS OVHcloud</text>
  <text x="700" y="76" text-anchor="middle" class="small">Frontend sur hebergement mutualise OVHcloud - Backend Spring Boot Dockerise sur VPS OVHcloud derriere Caddy - Base PostgreSQL Supabase</text>

  <!-- Users and internet -->
  <text x="700" y="115" text-anchor="middle" class="subtitle">Utilisateurs</text>
  <circle cx="700" cy="170" r="42" fill="#f8fafc" stroke="#111827" stroke-width="3"/>
  <path d="M658 170 H742 M700 128 C682 150 682 190 700 212 M700 128 C718 150 718 190 700 212 M670 145 C690 157 710 157 730 145 M670 195 C690 183 710 183 730 195" stroke="#111827" stroke-width="2" fill="none"/>
  <text x="700" y="240" text-anchor="middle" class="tiny">Navigateur Web</text>

  <!-- Frontend box -->
  <rect x="110" y="285" width="350" height="235" class="box blue-box"/>
  <text x="285" y="325" text-anchor="middle" class="blue-title">FRONTEND</text>
  <text x="285" y="352" text-anchor="middle" class="subtitle">React / Vite</text>
  <circle cx="285" cy="405" r="45" fill="#eff6ff" stroke="#38bdf8" stroke-width="3"/>
  <ellipse cx="285" cy="405" rx="72" ry="20" fill="none" stroke="#22d3ee" stroke-width="3" transform="rotate(0 285 405)"/>
  <ellipse cx="285" cy="405" rx="72" ry="20" fill="none" stroke="#22d3ee" stroke-width="3" transform="rotate(60 285 405)"/>
  <ellipse cx="285" cy="405" rx="72" ry="20" fill="none" stroke="#22d3ee" stroke-width="3" transform="rotate(120 285 405)"/>
  <circle cx="285" cy="405" r="6" fill="#0ea5e9"/>
  <text x="285" y="475" text-anchor="middle" class="label">Application statique</text>
  <text x="285" y="499" text-anchor="middle" class="small">HTML, CSS, JavaScript</text>
  <text x="285" y="265" text-anchor="middle" class="blue-title">trocskillhub.ovh</text>
  <text x="285" y="548" text-anchor="middle" class="small">Hebergement mutualise OVHcloud</text>

  <!-- Backend VPS / Caddy / Docker box -->
  <rect x="825" y="265" width="395" height="335" class="box green-box"/>
  <text x="1022" y="305" text-anchor="middle" class="green-title">BACKEND (API)</text>
  <text x="1022" y="333" text-anchor="middle" class="subtitle">VPS OVHcloud</text>
  <rect x="870" y="355" width="305" height="72" class="gray-box"/>
  <text x="1022" y="383" text-anchor="middle" class="orange-title">Caddy reverse proxy</text>
  <text x="1022" y="407" text-anchor="middle" class="small">HTTPS automatique Let's Encrypt</text>
  <rect x="870" y="455" width="305" height="105" class="gray-box"/>
  <text x="1022" y="488" text-anchor="middle" class="green-title">Spring Boot</text>
  <text x="1022" y="515" text-anchor="middle" class="label">API REST Dockerisee</text>
  <text x="1022" y="540" text-anchor="middle" class="small">Conteneur backend : port 8080</text>
  <text x="1022" y="245" text-anchor="middle" class="green-title">server.trocskillhub.ovh</text>
  <text x="1022" y="628" text-anchor="middle" class="small">Hebergement VPS OVHcloud</text>

  <!-- Database -->
  <rect x="825" y="685" width="395" height="160" class="box purple-box"/>
  <text x="1022" y="725" text-anchor="middle" class="purple-title">BASE DE DONNEES</text>
  <text x="1022" y="767" text-anchor="middle" class="subtitle">PostgreSQL</text>
  <text x="1022" y="797" text-anchor="middle" class="label">Supabase</text>
  <text x="1022" y="824" text-anchor="middle" class="small">Connexion JDBC avec SSL</text>

  <!-- CI/CD -->
  <rect x="110" y="635" width="540" height="200" class="box orange-box"/>
  <text x="380" y="675" text-anchor="middle" class="orange-title">CI / CD GitHub Actions</text>
  <text x="380" y="710" text-anchor="middle" class="label">Push sur main</text>
  <text x="380" y="739" text-anchor="middle" class="small">1. Build et tests sur runner GitHub heberge</text>
  <text x="380" y="764" text-anchor="middle" class="small">2. Deploiement via self-hosted runner sur le VPS</text>
  <text x="380" y="789" text-anchor="middle" class="small">3. git reset --hard origin/main + docker compose up -d --build</text>

  <!-- DNS -->
  <rect x="80" y="565" width="640" height="58" class="dash-box"/>
  <text x="400" y="590" text-anchor="middle" class="subtitle">Domaines &amp; DNS</text>
  <text x="400" y="612" text-anchor="middle" class="small">trocskillhub.ovh -> Frontend OVHcloud | server.trocskillhub.ovh -> VPS OVHcloud + Caddy</text>

  <!-- Arrows -->
  <path d="M670 205 C520 225 365 230 305 285" class="arrow"/>
  <text x="425" y="220" text-anchor="middle" class="https">HTTPS</text>
  <path d="M730 205 C850 225 975 230 1022 265" class="arrow"/>
  <text x="895" y="220" text-anchor="middle" class="https">HTTPS</text>

  <path d="M460 412 H825" class="arrow"/>
  <text x="642" y="384" text-anchor="middle" class="subtitle">Requetes API</text>
  <text x="642" y="407" text-anchor="middle" class="small">JSON / HTTPS vers server.trocskillhub.ovh</text>

  <path d="M1022 600 V685" class="arrow-green"/>
  <text x="1085" y="649" text-anchor="middle" class="small">JDBC SSL</text>

  <path d="M650 735 C735 700 785 560 870 520" class="arrow-blue"/>
  <text x="760" y="668" text-anchor="middle" class="small">deploiement automatique</text>

  <!-- Bottom principles -->
  <rect x="80" y="865" width="1240" height="68" class="gray-box"/>
  <text x="215" y="892" text-anchor="middle" class="subtitle">Securite</text>
  <text x="215" y="916" text-anchor="middle" class="small">HTTPS, Caddy, CORS, secrets hors Git</text>
  <text x="700" y="892" text-anchor="middle" class="subtitle">Maintenabilite</text>
  <text x="700" y="916" text-anchor="middle" class="small">Responsabilites separees : frontend / API / BDD</text>
  <text x="1165" y="892" text-anchor="middle" class="subtitle">Scalabilite</text>
  <text x="1165" y="916" text-anchor="middle" class="small">Chaque couche evolue independamment</text>
</svg>
