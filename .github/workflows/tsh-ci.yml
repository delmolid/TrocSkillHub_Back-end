

name: TrocSkillHub CI/CD

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    name: Build TrocSkillHub
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./TrocSkillHub
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: trocskillhub-${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
      - run: mvn clean compile

  test:
    name: Test TrocSkillHub
    env:
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ./TrocSkillHub

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin

      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: trocskillhub-${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Tests
        run: |
          unset SPRING_DATASOURCE_URL || true
          mvn test

      - name: Upload Surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: trocskillhub-surefire-${{ github.run_number }}
          path: ./TrocSkillHub/target/surefire-reports/
          retention-days: 7
  
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deployment
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
