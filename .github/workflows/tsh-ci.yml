# ============================================================
# CI GITHUB ACTIONS - TROCSKILLHUB
# ============================================================

name: TrocSkillHub CI

# ╔════════════════════════════════════════════════════════════╗
# ║ DÉCLENCHEURS : Quand la pipeline se lance                  ║
# ╚════════════════════════════════════════════════════════════╝
on:
  # À chaque PUSH
  push:
    branches:
      - '**'          # Toutes les branches

  # À chaque PULL REQUEST
  pull_request:
    branches:
      - main
      - develop

# ╔════════════════════════════════════════════════════════════╗
# ║ JOBS : Les tâches à exécuter                               ║
# ╚════════════════════════════════════════════════════════════╝
jobs:
  build:
    name: Build & Test TrocSkillHub
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Récupérer le code source
      - name: Code checkout
        uses: actions/checkout@v5

      # 2️⃣ Installer Java
      - name: Install Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3️⃣ Cache Maven (accélère les prochains builds)
      - name: Maven cash
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: trocskillhub-${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      # 4️⃣ Compiler
      - name: Build
        run: mvn clean compile

      # 5️⃣ Lancer les tests
      - name: Unit tests
        run: mvn test

      # 6️⃣ Upload des logs d'erreur si échec
      - name: Upload errors logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: trocskillhub-error-logs-${{ github.run_number }}
          path: target/surefire-reports/
          retention-days: 7
