spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/${POSTGRES_DB}_test
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

 
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format-sql: true
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
    
logging:
  level:
    org.springframework.security: DEBUG