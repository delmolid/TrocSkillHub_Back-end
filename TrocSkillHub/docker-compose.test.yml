services:
  postgres-test:
    image: postgres:16
    container_name: trocskillhubdatabase_test
    environment:
      POSTGRES_DB: ${POSTGRES_DB_TEST}
      POSTGRES_USER: ${POSTGRES_USER_TEST}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_TEST}
    ports:
      - "${POSTGRES_PORT_TEST}:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    networks:
      - troc-test-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER_TEST} -d ${POSTGRES_DB_TEST}"]
      interval: 10s
      timeout: 5s
      retries: 5


networks:
  troc-test-network:
    driver: bridge

volumes:
  postgres_test_data: